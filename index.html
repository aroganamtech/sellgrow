<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to SellGrow...</title>
  <script>
    let target = "/";
    if (window.location.protocol === "file:") {
      target = "http://localhost:11223";
    }
    window.location.replace(target);
  </script>
</head>
<body style="background: #070b13; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; select-none;">
  <div style="text-align: center;">
    <p style="font-size: 18px; font-weight: 500; margin-bottom: 8px;">Redirecting to SellGrow Portal...</p>
    <p style="font-size: 12px; color: #94a3b8; margin: 0;">If you are not redirected automatically, <a id="redirectLink" href="/" style="color: #38bdf8; text-decoration: none; font-weight: 600;">click here</a>.</p>
  </div>
  <script>
    document.getElementById("redirectLink").href = target;
  </script>
</body>
</html>
